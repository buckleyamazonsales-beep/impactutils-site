name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Stamp deploy version
        run: |
          VERSION="$(date -u +'%Y.%m.%d').${GITHUB_RUN_NUMBER}"
          UPDATED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          export VERSION UPDATED_AT

          perl -0pi -e "s#styles\\.css\\?v=[^\"']+#styles.css?v=\$ENV{VERSION}#g; s#app\\.js\\?v=[^\"']+#app.js?v=\$ENV{VERSION}#g" index.html
          perl -0pi -e "s/const SITE_VERSION = '[^']+';/const SITE_VERSION = '\$ENV{VERSION}';/" app.js

          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "deployed_asset": "app.js?v=${VERSION}",
            "updated_at": "${UPDATED_AT}"
          }
          EOF

      - name: Build server secrets
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_FOUNDER: ${{ secrets.STRIPE_PRICE_FOUNDER }}
          IMPACT_PUBLIC_SITE_URL: ${{ secrets.IMPACT_PUBLIC_SITE_URL }}
          IMPACT_ADMIN_API_KEY: ${{ secrets.IMPACT_ADMIN_API_KEY }}
        run: |
          python3 - <<'PY'
          import os

          def php_string(value):
              return "'" + str(value or "").replace("\\", "\\\\").replace("'", "\\'") + "'"

          values = {
              "STRIPE_SECRET_KEY": os.environ.get("STRIPE_SECRET_KEY", ""),
              "STRIPE_WEBHOOK_SECRET": os.environ.get("STRIPE_WEBHOOK_SECRET", ""),
              "STRIPE_PRICE_PRO": os.environ.get("STRIPE_PRICE_PRO", ""),
              "STRIPE_PRICE_FOUNDER": os.environ.get("STRIPE_PRICE_FOUNDER", ""),
              "IMPACT_PUBLIC_SITE_URL": os.environ.get("IMPACT_PUBLIC_SITE_URL", "https://impactutils.com"),
              "IMPACT_ADMIN_API_KEY": os.environ.get("IMPACT_ADMIN_API_KEY", ""),
          }

          missing = [key for key, value in values.items() if not value]
          if missing:
              raise SystemExit("Missing required GitHub Actions secrets: " + ", ".join(missing))

          with open("api/stripe-secrets.php", "w", encoding="utf-8") as fh:
              fh.write("<?php\nreturn [\n")
              for key, value in values.items():
                  fh.write(f"    '{key}' => {php_string(value)},\n")
              fh.write("];\n")

          lemon_values = {
              "LEMONSQUEEZY_API_KEY": os.environ.get("LEMONSQUEEZY_API_KEY", ""),
              "LEMONSQUEEZY_WEBHOOK_SECRET": os.environ.get("LEMONSQUEEZY_WEBHOOK_SECRET", ""),
              "LEMONSQUEEZY_STORE_ID": os.environ.get("LEMONSQUEEZY_STORE_ID", ""),
              "LEMONSQUEEZY_VARIANT_PRO": os.environ.get("LEMONSQUEEZY_VARIANT_PRO", ""),
              "LEMONSQUEEZY_VARIANT_FOUNDER": os.environ.get("LEMONSQUEEZY_VARIANT_FOUNDER", ""),
              "LEMONSQUEEZY_TEST_MODE": os.environ.get("LEMONSQUEEZY_TEST_MODE", ""),
              "IMPACT_PUBLIC_SITE_URL": values["IMPACT_PUBLIC_SITE_URL"],
              "IMPACT_ADMIN_API_KEY": values["IMPACT_ADMIN_API_KEY"],
          }

          with open("api/lemon-secrets.php", "w", encoding="utf-8") as fh:
              fh.write("<?php\nreturn [\n")
              for key, value in lemon_values.items():
                  fh.write(f"    '{key}' => {php_string(value)},\n")
              fh.write("];\n")
          PY

      - name: Deploy via SFTP with lftp
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          cd "$SFTP_REMOTE_PATH"
          mkdir -p api/data
          chmod 755 api
          chmod 777 api/data
          put -O . .htaccess
          put -O . index.html
          put -O . styles.css
          put -O . app.js
          put -O . version.json
          put -O . logo.png
          put -O api api/.htaccess
          put -O api api/admin-lemon-status.php
          put -O api api/admin-site-users.php
          put -O api api/admin-stripe-status.php
          put -O api api/billing-status.php
          put -O api api/community-state.php
          put -O api api/create-checkout-session.php
          put -O api api/create-portal-session.php
          put -O api api/forgot-password.php
          put -O api api/hiscores.php
          put -O api api/lemon-env.php
          put -O api api/lemon-secrets.php
          put -O api api/lemon-secrets.example.php
          put -O api api/lemonsqueezy-webhook.php
          put -O api api/recover-billing.php
          put -O api api/send-verification-email.php
          put -O api api/site-user-register.php
          put -O api api/stripe-billing.php
          put -O api api/stripe-secrets.example.php
          put -O api api/stripe-secrets.php
          put -O api api/stripe-webhook.php
          put -O api api/verify-checkout-session.php
          put -O api/data api/data/community-state.json
          chmod 666 api/data/community-state.json
          bye
          EOF
