name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via SFTP with lftp
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" "sftp://$SFTP_HOST:$SFTP_PORT" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
          cd "$SFTP_REMOTE_PATH"
          put -O . index.html
          put -O . styles.css
          put -O . app.js
          put -O . version.json
          put -O . logo.png
          put -O api api/.htaccess
          put -O api api/admin-lemon-status.php
          put -O api api/admin-site-users.php
          put -O api api/admin-stripe-status.php
          put -O api api/billing-status.php
          put -O api api/create-checkout-session.php
          put -O api api/create-portal-session.php
          put -O api api/forgot-password.php
          put -O api api/hiscores.php
          put -O api api/lemon-env.php
          put -O api api/lemon-secrets.example.php
          put -O api api/lemonsqueezy-webhook.php
          put -O api api/recover-billing.php
          put -O api api/send-verification-email.php
          put -O api api/site-user-register.php
          put -O api api/stripe-billing.php
          put -O api api/stripe-secrets.example.php
          put -O api api/stripe-secrets.php
          put -O api api/stripe-webhook.php
          put -O api api/verify-checkout-session.php
          bye
          EOF
